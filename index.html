<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logoweparty.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA -->
    <meta name="theme-color" content="#FFB74D" />
    <meta name="description" content="Descubra eventos perto de você e conecte-se com pessoas que também vão." />

    <!--
      Open Graph / Twitter Card — prévia ao compartilhar links (WhatsApp,
      Telegram, Facebook, X). São tags estáticas (mesmo conteúdo em toda
      rota): este é um SPA client-side puro, sem SSR/prerender, então
      crawlers sociais (que não executam JS) sempre leem este HTML — meta
      tags dinâmicas por evento/perfil não seriam vistas por eles.
      TODO: trocar og:image/twitter:image por URL ABSOLUTA (com domínio de
      produção) quando definida — caminho relativo funciona na maioria das
      plataformas, mas não é garantido pela especificação OG.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="We Party" />
    <meta property="og:title" content="We Party" />
    <meta property="og:description" content="Descubra eventos perto de você e conecte-se com pessoas que também vão." />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="We Party" />
    <meta name="twitter:description" content="Descubra eventos perto de você e conecte-se com pessoas que também vão." />
    <meta name="twitter:image" content="/pwa-512x512.png" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="We Party" />

    <!-- Content Security Policy - Proteção contra XSS e injeção de scripts -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com https://www.google.com https://maps.googleapis.com https://maps.google.com https://vercel.live;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://accounts.google.com;
      font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net data:;
      img-src 'self' data: https: blob:;
      connect-src 'self' http://localhost:8000 https://api.wepartyapp.com https://api.dev.wepartyapp.com https://api.hml.wepartyapp.com https://api.prod.wepartyapp.com https://api.engine.wepartyapp.com https://accounts.google.com https://*.ngrok-free.app https://vercel.live wss: ws:;
      frame-src 'self' https://accounts.google.com https://www.google.com https://maps.google.com https://vercel.live;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    "
    />

    <!-- X-Content-Type-Options via meta (fallback; authoritative value set in HTTP headers) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- X-Frame-Options MUST be set as an HTTP header — not supported as a meta tag -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      Preconnect para acelerar a conexão com o Google Fonts.
      A folha de estilo da fonte "Baloo Thambi 2" (e "Poppins") é injetada
      automaticamente pelo unplugin-fonts de forma NÃO bloqueante
      (rel="preload" + display=swap), então não há <link rel="stylesheet">
      manual aqui para evitar requisição que bloqueia a renderização.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>We Party</title>
  </head>
  <body>
    <div id="app"></div>
    
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
