<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logoweparty.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy - Proteção contra XSS e injeção de scripts -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com https://www.google.com https://maps.googleapis.com https://maps.google.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
      font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net data:;
      img-src 'self' data: https: blob:;
      connect-src 'self' http://localhost:8000 https://api.dev.wepartyapp.com https://api.hml.wepartyapp.com https://api.prod.wepartyapp.com https://api.engine.wepartyapp.com https://accounts.google.com wss: ws:;
      frame-src 'self' https://accounts.google.com https://www.google.com https://maps.google.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'self';
    "
    />

    <!-- Outras políticas de segurança -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    
    <!-- Políticas de segurança são configuradas via HTTP headers (vercel.json/netlify.toml) -->
    <!-- Meta tags de segurança são mantidas apenas como fallback -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <title>We Party</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- Google Sign-In SDK -->
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
