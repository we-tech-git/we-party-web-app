# ===========================================
# Netlify Configuration - We Party Web App
# ===========================================
# Configurações de build, deploy e headers de segurança

[build]
  command = "yarn build"
  publish = "dist"

# ===========================================
# HEADERS DE SEGURANÇA
# ===========================================
# Aplicados a todas as páginas para proteção contra ataques comuns

[[headers]]
  for = "/*"
  [headers.values]
    # Previne MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Previne clickjacking - permite apenas frames do mesmo domínio
    X-Frame-Options = "SAMEORIGIN"
    
    # Proteção XSS legada (navegadores modernos usam CSP)
    X-XSS-Protection = "1; mode=block"
    
    # Controla informações enviadas no header Referer
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Restringe APIs do navegador (câmera, microfone, geolocalização)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    
    # Força HTTPS por 1 ano (habilitar após confirmar que HTTPS funciona)
    # Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ===========================================
# CACHE PARA ASSETS ESTÁTICOS
# ===========================================
# Assets com hash no nome podem ser cacheados por muito tempo

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ===========================================
# REDIRECTS PARA SPA
# ===========================================
# Redireciona todas as rotas para index.html (Vue Router)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
